processing:
  optimization_profile: "GPU Ultra Realtime"
  model_path: "yolo11x.onnx"       # High-end ONNX model — run export_model.py --model yolo11x.pt once to generate
  frame_size: 1280
  confidence: 0.25
  iou_threshold: 0.45
  use_fp16: false                   # retained for legacy compatibility; current ONNX path uses FP32 tensors
  device: "cuda:0"                  # force CUDA-first inference for the real-time GPU profile
  augment_inference: false
  compile_mode: false
  realtime:
    target_fps: 18
    low_fps_patience: 12
    adaptive_frame_sizes: [1280, 1024, 960, 768]
    drop_stale_frames: true

tracking:
  enabled: true
  fps: 25
  track_activation_threshold: 0.2
  lost_track_buffer: 45
  minimum_matching_threshold: 0.65
  reassociation_window_seconds: 20.0
  max_center_distance_ratio: 0.25
  min_appearance_similarity: 0.35
  min_reassociation_score: 0.45

analytics:
  entry_line:
    - [80, 220]
    - [560, 220]
  line_margin: 12
  dwell_timeout_seconds: 2.0
  trail_length: 30

output:
  directory: "outputs"
  save_video: true
  save_csv: true
  save_heatmap: true

api:
  enabled: true
  host: "0.0.0.0"
  port: 8000

ui:
  title: "RetailVision CCTV Analytics"
  refresh_interval_ms: 250

cameras:
  - camera_id: "front_door"
    source: 0
    display: false

  # To analyse an uploaded video file, uncomment and set path:
  # - camera_id: "aisle_cam"
  #   source: "outputs/uploads/shop_floor.mp4"
  #   display: false
